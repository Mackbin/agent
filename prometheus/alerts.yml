groups:
  - name: ai-gateway-alerts
    interval: 30s
    rules:
      # API 错误率过高
      - alert: HighErrorRate
        expr: |
          sum(rate(app_requests_total{status=~"5.."}[5m])) 
          / sum(rate(app_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 错误率过高"
          description: "API 错误率超过 5% (当前值：{{ $value | humanizePercentage }})"

      # 响应时间过长
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(app_request_latency_seconds_bucket[5m])) by (le)) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "P99 响应时间超过 3 秒 (当前值：{{ $value | humanizeDuration }})"

      # 服务不可用
      - alert: ServiceDown
        expr: up{job="ai-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI Gateway 服务不可用"
          description: "服务 {{ $labels.instance }} 已经宕机超过 1 分钟"

      # 数据库连接池耗尽
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count >= pg_settings_max_connections * 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池接近耗尽"
          description: "数据库连接使用率超过 90% (当前值：{{ $value }})"

      # Redis 内存使用过高
      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率超过 90% (当前值：{{ $value | humanizePercentage }})"

      # 磁盘空间不足
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "磁盘可用空间低于 10% (当前值：{{ $value | humanizePercentage }})"
